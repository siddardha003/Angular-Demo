<div class="modal-overlay" (click)="close()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Post an Event</h2>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()" class="modal-form">

      <div class="form-row">
        <div class="form-group">
          <label>Event Title *</label>
          <input type="text" formControlName="title" placeholder="e.g. Bangalore Music Fest" />
          <span class="error" *ngIf="eventForm.get('title')?.invalid && eventForm.get('title')?.touched">
            Title is required
          </span>
        </div>

        <div class="form-group">
          <label>Category *</label>
          <select formControlName="category">
            <option value="">Select category</option>
            <option value="Music">Music</option>
            <option value="Technology">Technology</option>
            <option value="Food">Food</option>
            <option value="Sports">Sports</option>
            <option value="Art">Art</option>
            <option value="Comedy">Comedy</option>
          </select>
          <span class="error" *ngIf="eventForm.get('category')?.invalid && eventForm.get('category')?.touched">
            Category is required
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" formControlName="date" />
          <span class="error" *ngIf="eventForm.get('date')?.invalid && eventForm.get('date')?.touched">
            Date is required
          </span>
        </div>

        <div class="form-group">
          <label>Location *</label>
          <input type="text" formControlName="location" placeholder="e.g. Cubbon Park, Bangalore" />
          <span class="error" *ngIf="eventForm.get('location')?.invalid && eventForm.get('location')?.touched">
            Location is required
          </span>
        </div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" rows="3" placeholder="Describe your event..."></textarea>
        <span class="error" *ngIf="eventForm.get('description')?.invalid && eventForm.get('description')?.touched">
          Description is required
        </span>
      </div>

      <div class="form-row align-center">
        <div class="form-group toggle-group">
          <label>Free Event?</label>
          <input type="checkbox" formControlName="isFree" />
        </div>

        <div class="form-group" *ngIf="!isFree">
          <label>Price (₹)</label>
          <input type="number" formControlName="price" placeholder="e.g. 499" />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="close()">Cancel</button>
        <button type="submit" class="submit-btn">Post Event</button>
      </div>

    </form>
  </div>
</div>
