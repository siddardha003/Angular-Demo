<section class="hero">
  <div class="hero-content">
    <h1>Discover Events <span>Near You</span></h1>
    <p>Find and share amazing local events happening in your community.</p>
    <div class="hero-search">
      <input type="text" placeholder="Search events, locations..." />
      <button>Search</button>
    </div>
  </div>
</section>

<!-- Upcoming Events -->
<section class="upcoming-events">
  <div class="section-header">
    <h2>Upcoming Events</h2>
    <a routerLink="/events">View All →</a>
  </div>

  <div class="events-grid">
    <app-event-card
      *ngFor="let event of upcomingEvents"
      [event]="event">
    </app-event-card>
  </div>
</section>

<!-- Post Event Banner -->
<section class="post-banner">
  <div class="banner-content">
    <h2>Have an Event to Share?</h2>
    <p>Post your event for free and reach thousands of people in your community.</p>
    <button class="post-btn" (click)="modalService.open()">Post an Event</button>
  </div>
</section>
